name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Convert sample document
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check web app copies are in sync
        shell: pwsh
        run: |
          if ((Get-FileHash style.css).Hash -ne (Get-FileHash docs/style.css).Hash) {
            throw "docs/style.css is out of sync with style.css - run: Copy-Item style.css docs/style.css"
          }
          if ((Get-FileHash examples/sample.md).Hash -ne (Get-FileHash docs/sample.md).Hash) {
            throw "docs/sample.md is out of sync with examples/sample.md - run: Copy-Item examples/sample.md docs/sample.md"
          }
          Write-Host "OK: docs/ copies match their sources"

      - name: Convert sample Markdown to PDF
        run: node convert.js examples/sample.md

      - name: Verify PDF was created
        shell: pwsh
        run: |
          $pdf = "examples/sample.pdf"
          if (-not (Test-Path $pdf)) { throw "PDF was not created: $pdf" }
          $size = (Get-Item $pdf).Length
          if ($size -lt 10kb) { throw "PDF suspiciously small: $size bytes" }
          Write-Host "OK: $pdf ($size bytes)"

      - name: Upload sample PDF
        uses: actions/upload-artifact@v7
        with:
          name: sample-pdf
          path: examples/sample.pdf
